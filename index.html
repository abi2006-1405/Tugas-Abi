const texts = [

`Hai sayang...

`Kalau aku minta kesempatan untuk jadi pacarmu lagi...

apa kamu mau mempertimbangkannya? ❤️`

];

/* =========================
   TYPE EFFECT
========================= */

function typeText(id,text){

const el = document.getElementById(id);

if(!el) return;

el.innerHTML = "";

let i = 0;

function typing(){

if(i < text.length){

if(text.charAt(i) === "\n"){

el.innerHTML += "<br>";

}else{

el.innerHTML += text.charAt(i);

}

i++;

setTimeout(
typing,
Math.random()*25+20
);

}

}

typing();

}

/* =========================
   PAGE
========================= */

let currentPage = 0;

const pages =
document.querySelectorAll(".page");

function nextPage(){

if(currentPage === 0){

document
.getElementById("bgVideo")
.style.opacity = "1";

const musik =
document.getElementById("musik");

if(musik){

musik.play().catch(()=>{});

}

startHearts();

}

pages[currentPage]
.classList.remove("active");

currentPage++;

if(currentPage < pages.length){

pages[currentPage]
.classList.add("active");

typeText(
"text"+currentPage,
texts[currentPage]
);

}

}

/* =========================
   START PAGE
========================= */

/* =========================
   LOVE EFFECT
========================= */

let heartInterval;

function createHeart(){

const heart =
document.createElement("div");

const hearts = [
"❤️",
"💕",
"💖",
"🤍"
];

heart.innerHTML =
hearts[
Math.floor(
Math.random()*hearts.length
)
];

heart.classList.add("heart");

heart.style.left =
Math.random()*window.innerWidth
+ "px";

heart.style.fontSize =
(Math.random()*20+15)
+ "px";

document.body.appendChild(
heart
);

let pos = -50;

const fall = setInterval(()=>{

pos += 3;

heart.style.top =
pos + "px";

if(pos > window.innerHeight){

clearInterval(fall);

heart.remove();

}

},20);

}

function startHearts(){

if(!heartInterval){

heartInterval =
setInterval(
createHeart,
1800
);

}

}
